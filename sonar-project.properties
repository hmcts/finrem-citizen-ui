sonar.projectKey=finrem-citizen-ui
sonar.projectName=finrem-citizen-ui
sonar.language=typescript
sonar.sources=src/main
sonar.tests=src/test
sonar.test.exclusions=test/coverage/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/main/modules/oidc/**,src/main/routes/logout.ts,src/main/modules/session/**
sonar.exclusions=src/main/app.ts,src/main/development.ts,src/main/index.js,src/main/server.ts, \
  src/main/routes/health.ts,src/main/routes/home.ts,src/main/HttpError.ts,src/main/modules/appinsights/index.ts,\
  src/main/modules/properties-volume/index.ts,src/main/modules/helmet/index.ts,src/main/modules/nunjucks/index.ts,\
  src/main/assets/**,src/main/routes/info.ts,src/main/routes/autocomplete.ts,src/**/*.test.ts,src/**/*.spec.ts,src/main/app/case/definition.ts

sonar.organization=hmcts

# Suppress hardcoded string warnings in test validation logic (placeholder check for AAAAAAAAAAAA is intentional)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=src/main/modules/oidc/index.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=src/main/modules/oidc/index.ts
