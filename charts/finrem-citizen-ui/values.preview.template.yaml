global:
  security:
    allowInsecureImages: true
nodejs:
  # Don't modify below here
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  devcpuRequests: 250m
  devmemoryRequests: 1Gi
  devcpuLimits: 1
  devmemoryLimits: 1Gi
  readinessDelay: 45
  readinessTimeout: 5
  readinessPeriod: 15
  livenessDelay: 45
  livenessTimeout: 5
  livenessPeriod: 15

  registerAdditionalDns:
    enabled: true
    prefix: civil
    primaryIngressHost: ${SERVICE_FQDN}
  autoscaling:
    enabled: false
  environment:
    IDAM_TOKEN_CACHE: true
    OAUTH_CALLBACK_URL: 'https://${SERVICE_FQDN}/oauth2/callback'
    IDAM_CLIENT_ID: finrem-citizen-ui

    # AAT IDAM even in preview
    IDAM_WEB_URL: https://hmcts-access.aat.platform.hmcts.net/login
    IDAM_END_SESSION_URL: https://hmcts-access.aat.platform.hmcts.net/o/endSession
    IDAM_API_URL: https://idam-api.aat.platform.hmcts.net/o/token
    REDIS_CONNECTION_STRING: 'redis://{{ .Release.Name }}-redis-master:6379'

  #    CASE_TYPE: NFD-4798 # Uncomment to connect to backend PR, don't forget Jenkinsfile_CNP too
  keyVaults:
    finrem:
      resourceGroup: finrem
      secrets:
        - name: AppInsightsInstrumentationKey-Preview
          alias: AppInsightsInstrumentationKey
        - finrem-system-update-username
        - finrem-system-update-password
        - idam-systemupdate-username
        - idam-systemupdate-password
        - finrem-citizen-ui-idam-client-secret
        - app-insights-connection-string

idam-pr:
  enabled: true
  redirect_uris:
    finrem:
      - https://${SERVICE_FQDN}/oauth2/callback
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  image:
    registry: hmctspublic.azurecr.io
    repository: imported/bitnami/redis
